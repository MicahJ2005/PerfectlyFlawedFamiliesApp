<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <!-- ── PWA Core ──────────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2E7D6B" />

    <!-- ── iOS / Safari PWA ─────────────────────────────────────────────── -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Perfectly Flawed Families" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Splash screens for common iPhone sizes -->
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-390x844.png" />
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)"
      href="/splash/splash-375x812.png" />
    <link rel="apple-touch-startup-image"
      media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)"
      href="/splash/splash-414x896.png" />

    <!-- ── Android / Chrome ──────────────────────────────────────────────── -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Perfectly Flawed Families" />

    <!-- ── SEO ───────────────────────────────────────────────────────────── -->
    <meta name="description" content="Free faith-based family app with personalized devotions, a community prayer wall, and Scripture-grounded guidance for marriage, parenting, blended families, and more." />
    <meta name="keywords" content="faith-based family app, Christian family devotions, family prayer wall, Scripture-based parenting, Christian parenting app, family devotional app, blended family guidance, marriage devotions, parenting app" />
    <meta name="author" content="Perfectly Flawed Leadership" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://perfectlyflawedfamilies.web.app/" />

    <!-- ── Open Graph ────────────────────────────────────────────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Perfectly Flawed Families" />
    <meta property="og:title" content="Perfectly Flawed Families — Free Faith-Based Family App" />
    <meta property="og:description" content="Free faith-based family app with personalized devotions, a community prayer wall, and Scripture-grounded guidance for marriage, parenting, blended families, and more." />
    <meta property="og:url" content="https://perfectlyflawedfamilies.web.app/" />
    <meta property="og:image" content="https://perfectlyflawedfamilies.web.app/icons/icon-512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Perfectly Flawed Families app logo — a family tree on a teal background" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ───────────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Perfectly Flawed Families — Free Faith-Based Family App" />
    <meta name="twitter:description" content="Personalized family devotions, a community prayer wall, and Scripture-grounded guidance for your family's toughest moments. Free — no download required." />
    <meta name="twitter:image" content="https://perfectlyflawedfamilies.web.app/icons/icon-512.png" />
    <meta name="twitter:image:alt" content="Perfectly Flawed Families app" />

    <!-- ── Fonts ─────────────────────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />

    <title>Perfectly Flawed Families</title>

    <style>
      /* Prevent flash of unstyled background */
      html, body, #root {
        margin: 0; padding: 0;
        background: #EDEAE4;
        height: 100%;
        -webkit-tap-highlight-color: transparent;
        -webkit-font-smoothing: antialiased;
      }
      /* Hide scrollbar on iOS */
      body { overflow: hidden; }
    </style>
  </head>
  <body>
    <noscript>You need JavaScript enabled to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
